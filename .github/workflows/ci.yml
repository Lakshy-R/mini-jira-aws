name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '20'
  AWS_REGION:   'eu-north-1'

jobs:
  # ─── Lint & Build ────────────────────────────────────────────────────────────
  lint-backend:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend

      # Fail on import errors or unresolved modules
      - run: node --check src/app.js
        working-directory: backend

  lint-frontend:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        working-directory: frontend
        env:
          # Vite bakes these into the bundle at build time
          VITE_API_URL:              ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID:    ${{ secrets.VITE_COGNITO_CLIENT_ID }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─── Deploy (master / main only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 Fleet
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Rolling deploy via SSM Run Command — no SSH, no bastion host needed.
      # Sends a command to ALL instances in the ASG simultaneously.
      # PM2 cluster mode keeps at least one process alive during reload.
      - name: Rolling deploy via SSM Run Command
        run: |
          ASG_NAME="MiniJiraStack-Asg*"

          # Discover instance IDs from the ASG
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?contains(AutoScalingGroupName,'MiniJiraStack-Asg')].Instances[*].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instances found in ASG — skipping deploy"
            exit 0
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/mini-jira-aws",
              "git fetch origin master",
              "git reset --hard origin/master",
              "cd backend && npm ci --omit=dev",
              "pm2 reload backend --update-env"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"
          echo "Waiting for command to complete..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id $(echo $INSTANCE_IDS | awk '{print $1}')

          echo "Deploy complete."

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name MiniJiraStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "CloudFront invalidation submitted for $DIST_ID"
          fi
